services:
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: car_workshop_horizon
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan horizon
    environment:
      APP_ENV: local
      DB_HOST: pgsql
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      MAIL_PORT: 1025
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: http://rustfs:9000
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - laravel

  pail:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: car_workshop_pail
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan pail --timeout=0 --verbose
    environment:
      APP_ENV: local
      DB_HOST: pgsql
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      MAIL_PORT: 1025
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - laravel
